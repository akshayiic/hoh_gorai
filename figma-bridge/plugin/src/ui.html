<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figma Desktop Bridge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1e1e1e;
      color: #ffffff;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 300px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .status.connected {
      background: #10b981;
      color: white;
    }

    .status.disconnected {
      background: #ef4444;
      color: white;
    }

    .status.connecting {
      background: #f59e0b;
      color: white;
    }

    .info {
      background: #374151;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 12px;
      line-height: 1.4;
    }

    .info p {
      margin-bottom: 8px;
    }

    .info p:last-child {
      margin-bottom: 0;
    }

    .button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .button:hover {
      background: #2563eb;
    }

    .button:disabled {
      background: #6b7280;
      cursor: not-allowed;
    }

    .log {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 8px;
      margin-top: 16px;
      height: 120px;
      overflow-y: auto;
      font-size: 11px;
      font-family: 'Courier New', monospace;
    }

    .log-entry {
      margin-bottom: 4px;
      padding: 2px 0;
      border-bottom: 1px solid #1f2937;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-timestamp {
      color: #9ca3af;
      margin-right: 8px;
    }

    .log-message {
      color: #e5e7eb;
    }

    .log-message.success {
      color: #10b981;
    }

    .log-message.error {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Figma Desktop Bridge</h1>

    <div id="status" class="status connecting">Connecting...</div>

    <div class="info">
      <p><strong>Connection:</strong> ws://localhost:9223</p>
      <p><strong>Purpose:</strong> Bridge CLI AI agent to Figma</p>
      <p><strong>Status:</strong> <span id="status-text">Initializing...</span></p>
    </div>

    <button id="reconnect-btn" class="button">Reconnect</button>

    <div id="log" class="log"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const statusTextEl = document.getElementById('status-text');
    const reconnectBtn = document.getElementById('reconnect-btn');
    const logEl = document.getElementById('log');

    function addLog(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = 'log-entry';

      const timestamp = document.createElement('span');
      timestamp.className = 'log-timestamp';
      timestamp.textContent = new Date().toLocaleTimeString();

      const messageEl = document.createElement('span');
      messageEl.className = `log-message ${type}`;
      messageEl.textContent = message;

      entry.appendChild(timestamp);
      entry.appendChild(messageEl);
      logEl.appendChild(entry);

      logEl.scrollTop = logEl.scrollHeight;
    }

    function updateConnectionStatus(status) {
      statusEl.className = `status ${status.toLowerCase()}`;

      switch (status) {
        case 'CONNECTED':
          statusEl.textContent = 'Connected';
          statusTextEl.textContent = 'Bridge active';
          reconnectBtn.disabled = true;
          addLog('Connected to MCP server', 'success');
          break;
        case 'DISCONNECTED':
          statusEl.textContent = 'Disconnected';
          statusTextEl.textContent = 'Bridge inactive';
          reconnectBtn.disabled = false;
          addLog('Disconnected from MCP server', 'error');
          break;
        default:
          statusEl.textContent = status;
          statusTextEl.textContent = status.toLowerCase();
          break;
      }
    }

    reconnectBtn.addEventListener('click', () => {
      addLog('Attempting to reconnect...', 'info');
      parent.postMessage({ pluginMessage: { type: 'RECONNECT' } }, '*');
    });

    // Listen for messages from plugin code
    window.addEventListener('message', (event) => {
      const msg = event.data.pluginMessage;
      if (msg) {
        updateConnectionStatus(msg.type);
      }
    });

    // Initial log
    addLog('Plugin loaded', 'info');
  </script>
</body>
</html>
